<!-- load static files -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Essential Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
<!-- get rid of some things and follow the stuff in video
 23:45 just in case doesnt save -->
    <!-- SEO Meta Tags -->
    <title>Page Title - Brand Name</title>
    <meta name="description" content="A brief, engaging summary of the page content (150-160 characters).">
    <meta name="author" content="Your Name or Company">
    <meta name="robots" content="index, follow">

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">


    <!-- Links (Favicons, Stylesheets) -->
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'styles.css' %}">

    <!-- custom js -->
     <script src="{% static 'functions.js' %}" defer></script>
     {% block scripts %}
     <!-- this will be linked with the overall js or something like that -->
        <!-- <script src="{% static 'functions.js' %}" defer></script> -->
     {% endblock scripts %}

     <title>read posts | {% block title %} {% endblock title %}</title>
</head>
<body>
    <!-- class is bootstrap -->
    <div class="container mt-3">
     {% block content %}
     {% endblock content %}
    </div>
    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <!-- jquery -->
     <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
</body>
</html>
